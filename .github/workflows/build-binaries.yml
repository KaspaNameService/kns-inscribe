name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/kns-inscribe
          - os: macos-latest
            artifact_suffix: macos-arm64
            rust_target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/kns-inscribe
          - os: macos-latest
            artifact_suffix: macos-x86_64
            rust_target: x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/kns-inscribe
          - os: windows-latest
            artifact_suffix: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/kns-inscribe.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked -p kns-inscribe --target ${{ matrix.rust_target }}

      - name: Prepare release files (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          asset_name="kns-inscribe-${{ matrix.artifact_suffix }}"
          asset_path="release/${asset_name}"

          cp "${{ matrix.binary_path }}" "${asset_path}"
          shasum -a 256 "${asset_path}" > "${asset_path}.sha256"

      - name: Prepare release files (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null

          $assetName = "kns-inscribe-${{ matrix.artifact_suffix }}.exe"
          $assetPath = Join-Path "release" $assetName

          Copy-Item "${{ matrix.binary_path }}" $assetPath

          $hash = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLower()
          "$hash  $assetName" | Out-File -Encoding ascii "${assetPath}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: kns-inscribe-${{ matrix.artifact_suffix }}
          path: |
            release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout (for installer scripts)
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create or update release and upload assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            # Create a draft by default so notes can be polished before publishing.
            gh release create "$tag" --title "$tag" --draft --generate-notes
          fi

          gh release upload "$tag" release/* --clobber
          gh release upload "$tag" install.sh install.ps1 --clobber
